name: Ubuntu Build

on:
  push:
    branches: [main, 'develop-**']
  pull_request:
    branches: [main]

jobs:
  ubuntu-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        compiler: [gcc, clang]
        build_type: [debug, release]
        library_type: [shared]
        include:
          # Test static libraries only in release builds to minimize CI time
          - compiler: gcc
            build_type: release
            library_type: static
        exclude:
          # For develop-* branches, run only gcc+debug+shared
          - compiler: ${{ startsWith(github.ref, 'refs/heads/develop-') && 'clang' || '_no_match_' }}
          - build_type: ${{ startsWith(github.ref, 'refs/heads/develop-') && 'release' || '_no_match_' }}
    name: Build - ${{ matrix.compiler }} - ${{ matrix.build_type }} - ${{ matrix.library_type }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu-build-steps
        with:
          cmake_workflow: workflow-test-${{ matrix.compiler }}-${{ matrix.build_type }}
          build_shared_libs: ${{ matrix.library_type == 'shared' && 'ON' || 'OFF' }}
  
  ubuntu-build-summary:
    runs-on: ubuntu-latest
    needs: ubuntu-build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.ubuntu-build.result }}" != "success" ]; then
            echo "Ubuntu build failed"
            exit 1
          fi
          echo "All Ubuntu builds passed"