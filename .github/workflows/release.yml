name: Create Release

# Trigger the workflow only when a tag starting with 'v' is pushed
# Example: v1.0.0, v2.3.1-beta, etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-packages:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            workflow-preset: workflow-package-gcc-shared
            artifact-path: out/packages/package-gcc-release-shared
          - os: windows-latest
            workflow-preset: workflow-package-msvc-shared
            artifact-path: out/packages/package-msvc-release-shared
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set VCPKG_ROOT (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
        shell: bash
      
      - name: Set VCPKG_ROOT (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
        shell: pwsh
      
      - name: Install build tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev
        shell: bash
      
      - name: Install NSIS (Windows only)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y
      
      - name: Create package
        run: |
          cmake --workflow --preset ${{ matrix.workflow-preset }}
        shell: bash
      
      - name: Upload ${{ matrix.os }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-shared-build
          path: ${{ github.workspace }}/${{ matrix.artifact-path }}/*.*
          retention-days: 1

  create-release:
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ubuntu-latest-shared-build/*
            windows-latest-shared-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}